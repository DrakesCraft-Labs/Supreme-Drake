<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
  <defs>
    <linearGradient id="supBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180400" />
      <stop offset="50%" stop-color="#2D0B00" />
      <stop offset="100%" stop-color="#0F0200" />
    </linearGradient>

    <linearGradient id="goldRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" />
      <stop offset="50%" stop-color="#FFA751" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>

    <filter id="supGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes supPulse {
      0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.7)); }
      50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(255, 215, 0, 1)); }
    }
    @keyframes wireFlow {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }

    .bg-sup { fill: url(#supBg); }
    .title-sup { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 44px; fill: url(#goldRed); animation: supPulse 3.5s infinite ease-in-out; }
    .sub-sup { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; fill: #FFB380; letter-spacing: 3px; }
    .wire-sup { stroke: url(#goldRed); stroke-width: 2; fill: none; stroke-dasharray: 14 7; animation: wireFlow 14s linear infinite; opacity: 0.5; }
    .badge-sup { fill: #2B0D05; stroke: #FF4500; stroke-width: 1.5; rx: 6px; }
    .btext-sup { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; fill: #FFA751; }
  </style>

  <rect class="bg-sup" width="920" height="300" rx="14" stroke="#FF4500" stroke-width="1.5" />
  <path class="wire-sup" d="M 50,40 H 870 M 50,260 H 870 M 100,0 V 300 M 820,0 V 300 M 50,150 H 870" />

  <g transform="translate(460, 95)">
    <polygon points="0,-42 34,-20 34,20 0,42 -34,20 -34,-20" fill="#2B0D05" stroke="url(#goldRed)" stroke-width="3" filter="url(#supGlow)" />
    <circle cx="0" cy="0" r="10" fill="#FFD700" />
  </g>

  <text x="460" y="185" text-anchor="middle" class="title-sup">SUPREME DRAKE</text>
  <text x="460" y="215" text-anchor="middle" class="sub-sup">ENDGAME MACHINERY &amp; CARDS · RUST HYBRID ACCELERATED</text>

  <g transform="translate(230, 245)">
    <rect x="0" y="0" width="145" height="30" class="badge-sup" />
    <text x="12" y="20" class="btext-sup">SUPREME CARDS</text>

    <rect x="165" y="0" width="150" height="30" class="badge-sup" stroke="#FFD700" />
    <text x="177" y="20" class="btext-sup" fill="#FFD700">RUST FFM HYBRID</text>

    <rect x="335" y="0" width="135" height="30" class="badge-sup" stroke="#00FF66" />
    <text x="347" y="20" class="btext-sup" fill="#00FF66">PAPER 1.21.11</text>
  </g>
</svg>
